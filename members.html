<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500&family=Noto+Sans+JP:wght@400;500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=Cormorant:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/style.css">
  <title>PROFILE | NMIXX</title>
</head>

<body>
  <div id="header-placeholder"></div>

<main>
    <section class="profile">
      <div class="profile__inner">
        <div class="profile__heading-wrap">
          <h1 class="heading">PROFILE</h1>
        </div>

        <ul class="profile__list">
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/lily.jpg" alt="LILY">
              <figcaption class="profile__caption">
                <span class="profile__name">LILY</span>
                <span class="profile__birthday">2002.10.17</span>
              </figcaption>
            </figure>
          </li>
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/haewon.jpg" alt="HAEWON">
              <figcaption class="profile__caption">
                <span class="profile__name">HAEWON</span>
                <span class="profile__birthday">2003.02.25</span>
              </figcaption>
            </figure>
          </li>
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/sullyoon.jpg" alt="SULLYOON">
              <figcaption class="profile__caption">
                <span class="profile__name">SULLYOON</span>
                <span class="profile__birthday">2004.01.26</span>
              </figcaption>
            </figure>
          </li>
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/bae.jpg" alt="BAE">
              <figcaption class="profile__caption">
                <span class="profile__name">BAE</span>
                <span class="profile__birthday">2004.12.28</span>
              </figcaption>
            </figure>
          </li>
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/jiwoo.jpg" alt="JIWOO">
              <figcaption class="profile__caption">
                <span class="profile__name">JIWOO</span>
                <span class="profile__birthday">2005.04.13</span>
              </figcaption>
            </figure>
          </li>
          <li class="profile__item">
            <figure class="profile__figure">
              <img class="profile__image" src="./img/kyujin.jpg" alt="KYUJIN">
              <figcaption class="profile__caption">
                <span class="profile__name">KYUJIN</span>
                <span class="profile__birthday">2006.05.26</span>
              </figcaption>
            </figure>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <div id="footer-placeholder"></div>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="./js/script.js"></script>
  <script src="./js/gsap.js"></script>
  <script src="./js/include-parts.js"></script>
</body>

</html>
